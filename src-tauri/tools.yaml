# NarrativeStructure MCP Tools Definition
# This file provides structured tool descriptions for AI agents
# to understand and consume NarrativeStructure functionality.

version: "0.1.0"
protocol: "mcp/stdio"
server:
  name: "narrative-structure-mcp"
  binary: "narrative-mcp"

categories:
  - name: "project"
    label: "项目管理"
    tools:
      - name: "open_project"
        description: "打开一个已有的 NarrativeStructure 项目（包含 narrative.db 的目录）"
        parameters:
          - name: "path"
            type: "string"
            required: true
            description: "项目目录的绝对路径"
        returns: "text confirmation"
        
      - name: "close_project"
        description: "关闭当前打开的项目，释放数据库连接"
        parameters: []
        returns: "text confirmation"
        
      - name: "get_project_info"
        description: "获取当前项目的路径和基本信息（总块数、标题数等）"
        parameters: []
        returns: "text with project statistics"
        
      - name: "import_document"
        description: "导入 MinerU 输出的 zip 压缩包到当前项目（追加模式）"
        parameters:
          - name: "zip_path"
            type: "string"
            required: true
            description: "zip 文件的绝对路径"
        returns: "text confirmation"

  - name: "structure"
    label: "文档结构"
    tools:
      - name: "get_toc"
        description: "获取文档的目录树（TOC），返回层级化的标题结构"
        parameters: []
        returns: "JSON array of TOC nodes"
        
      - name: "get_page_stats"
        description: "统计每个 PDF 页码包含的语义块数量"
        parameters: []
        returns: "text with page statistics"

  - name: "blocks"
    label: "语义块操作"
    tools:
      - name: "get_blocks"
        description: "获取语义块列表（支持分页和按父节点过滤）"
        parameters:
          - name: "parent_id"
            type: "string"
            required: false
            description: "可选：只获取指定父块下的子块"
          - name: "limit"
            type: "integer"
            required: false
            default: 100
            description: "返回数量上限"
          - name: "offset"
            type: "integer"
            required: false
            default: 0
            description: "偏移量"
        returns: "JSON array of Block objects"
        
      - name: "get_block"
        description: "根据 ID 获取单个语义块的完整信息"
        parameters:
          - name: "id"
            type: "string"
            required: true
            description: "语义块的唯一 ID"
        returns: "JSON Block object"
        
      - name: "get_blocks_by_page"
        description: "根据 PDF 页码范围获取该页上的所有语义块"
        parameters:
          - name: "page_start"
            type: "integer"
            required: true
            description: "起始页码（包含）"
          - name: "page_end"
            type: "integer"
            required: true
            description: "结束页码（包含）"
        returns: "JSON array of Block objects"
        
      - name: "update_block"
        description: "更新语义块的内容（带乐观锁版本控制）"
        parameters:
          - name: "id"
            type: "string"
            required: true
            description: "语义块的唯一 ID"
          - name: "content"
            type: "string"
            required: true
            description: "新的内容"
          - name: "version"
            type: "integer"
            required: true
            description: "期望的当前版本号（用于乐观锁）"
        returns: "text confirmation with new version"

  - name: "search"
    label: "搜索"
    tools:
      - name: "search_blocks"
        description: "使用 FTS5 全文搜索引擎搜索语义块"
        parameters:
          - name: "query"
            type: "string"
            required: true
            description: "搜索关键词（支持 FTS5 语法）"
          - name: "limit"
            type: "integer"
            required: false
            default: 20
            description: "返回结果数量上限"
        returns: "JSON array of matching Block objects"

   - name: "diagnostics"
     label: "前端诊断"
     description: "通过 eval_queue 文件队列向运行中的 Tauri 应用注入 JavaScript，用于程序调试和项目内容了解。注意：需要 App 正在运行 (npm run tauri dev)。\n\n使用方法: echo 'JS_CODE' > /tmp/narrative-eval-queue.txt"
     tools:
       - name: "eval_js_sync"
         description: "同步执行 JavaScript 并等待结果返回。比 eval_queue 更可靠，直接通过 Tauri 命令调用，自动处理 Promise。需要 App 正在运行。"
         parameters:
           - name: "script"
             type: "string"
             required: true
             description: "要执行的 JavaScript 代码（支持 Promise）"
         returns: "JSON 字符串结果"
         example: |
           # 获取页面状态
           eval_js_sync({script: "window.pageControllerBridge?.getState()"})
           # 打开项目
           eval_js_sync({script: "window.nsOpenProject('/path/to/project', 'name')"})
           # 翻页
           eval_js_sync({script: "window.nsNavigateToPage(5)"})
           
       - name: "eval_get_text"
         description: "获取当前页面所有可见文本内容。通过 eval_queue 注入 JS 到 Tauri 应用。"
         usage: "echo 'document.body.innerText.substring(0, 5000)' > /tmp/narrative-eval-queue.txt"
         example: |
           # 获取页面文本
           echo 'document.body.innerText.substring(0, 5000)' > /tmp/narrative-eval-queue.txt
           
       - name: "eval_get_html"
         description: "获取当前页面 HTML 结构。通过 eval_queue 注入 JS 到 Tauri 应用。"
         usage: "echo 'document.body.outerHTML.substring(0, 20000)' > /tmp/narrative-eval-queue.txt"
         example: |
           # 获取特定区域
           echo 'document.querySelector(\".workspace-area\")?.outerHTML' > /tmp/narrative-eval-queue.txt"
           
       - name: "eval_get_console"
         description: "通过 eval_queue 执行自定义诊断脚本。"
         usage: "echo 'window.pageControllerBridge?.getState()' > /tmp/narrative-eval-queue.txt"
         example: |
           # 获取页面状态
           echo 'window.pageControllerBridge?.getState()' > /tmp/narrative-eval-queue.txt

  - name: "assets"
    label: "资源文件"
    tools:
      - name: "list_assets"
        description: "列出项目 assets 目录下的所有资源文件"
        parameters: []
        returns: "text list of relative file paths"
        
      - name: "find_asset"
        description: "在 assets 目录中搜索匹配模式的文件"
        parameters:
          - name: "pattern"
            type: "string"
            required: true
            description: "文件名匹配模式（子串匹配）"
        returns: "text with matching file path or not found message"

  - name: "page_agent"
    label: "Page Agent GUI 驱动"
    description: "使用 Page Agent 的 PageController（不需要 LLM）来驱动 GUI 操作。外部 Agent 通过 page_get_state 获取简化 DOM，然后用 page_do_action 执行操作。"
    tools:
      - name: "page_get_state"
        description: "获取当前页面的简化 DOM 状态。返回可交互元素的索引化列表，如 '[0]<button>Open</button>[1]<input/>'。外部 Agent 用这些索引调用 page_do_action。"
        parameters: []
        returns: "JSON: {url, title, header, content, footer}"
        example: |
          # 获取当前页面状态
          page_get_state()
          # 返回: {url: "...", content: "[0]<button>导入文档开始</button>[1]<button>打开已有项目</button>..."}

      - name: "page_do_action"
        description: "对当前页面执行操作。类型: click(点击), fill(填写), scroll(滚动), select(选择), execute_js(执行 JS)。target 为元素索引。"
        parameters:
          - name: "type"
            type: "string"
            required: true
            description: "操作类型: click, fill, scroll, select, execute_js"
          - name: "target"
            type: "string"
            required: false
            description: "元素索引（从 page_get_state 获取）"
          - name: "value"
            type: "string"
            required: false
            description: "fill 填写的文本 / select 选择的选项 / execute_js 执行的脚本"
          - name: "scroll_down"
            type: "boolean"
            required: false
            default: true
            description: "scroll 时是否向下滚动"
          - name: "pixels"
            type: "integer"
            required: false
            description: "scroll 时滚动的像素数"
        returns: "JSON: {success, message}"
        example: |
          # 点击索引 0 的元素
          page_do_action({type: "click", target: "0"})
          # 在索引 1 的输入框填写文本
          page_do_action({type: "fill", target: "1", value: "/path/to/file"})

      - name: "page_screenshot"
        description: "截取当前页面截图，返回 base64 编码的 PNG 图片。用于确认 page_do_action 操作后的页面状态。"
        parameters: []
        returns: "JSON: {success, screenshot: base64_string}"

# Usage Examples
examples:
  - name: "List all tools"
    command: "echo '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"tools/list\"}' | narrative-mcp -p /path/to/project"
    
  - name: "Get project info"
    command: "echo '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"tools/call\",\"params\":{\"name\":\"get_project_info\"}}' | narrative-mcp -p /path/to/project"
    
  - name: "Search for content"
    command: "echo '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"tools/call\",\"params\":{\"name\":\"search_blocks\",\"arguments\":{\"query\":\"keyword\"}}}' | narrative-mcp -p /path/to/project"
    
  - name: "Get TOC"
    command: "echo '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"tools/call\",\"params\":{\"name\":\"get_toc\"}}' | narrative-mcp -p /path/to/project"

# Block Schema
block_schema:
  id: "string (UUID)"
  parent_id: "string (UUID) | null"
  order_idx: "integer"
  level: "integer (heading level, 0 for non-headings)"
  block_type: "string (heading|text|interline_equation|table|image|empty)"
  content: "string (edited content)"
  original_content: "string (original extracted content)"
  metadata: "string (JSON with page, position, etc.)"
  version: "integer (optimistic lock version)"
  created_at: "string (ISO 8601 timestamp)"
  updated_at: "string (ISO 8601 timestamp)"