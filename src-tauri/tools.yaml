# NarrativeStructure MCP Tools Definition
# This file provides structured tool descriptions for AI agents
# to understand and consume NarrativeStructure functionality.

version: "0.1.0"
protocol: "mcp/stdio"
server:
  name: "narrative-structure-mcp"
  binary: "narrative-mcp"

categories:
  - name: "project"
    label: "项目管理"
    tools:
      - name: "open_project"
        description: "打开一个已有的 NarrativeStructure 项目（包含 narrative.db 的目录）"
        parameters:
          - name: "path"
            type: "string"
            required: true
            description: "项目目录的绝对路径"
        returns: "text confirmation"
        
      - name: "close_project"
        description: "关闭当前打开的项目，释放数据库连接"
        parameters: []
        returns: "text confirmation"
        
      - name: "get_project_info"
        description: "获取当前项目的路径和基本信息（总块数、标题数等）"
        parameters: []
        returns: "text with project statistics"
        
      - name: "import_document"
        description: "导入 MinerU 输出的 zip 压缩包到当前项目（追加模式）"
        parameters:
          - name: "zip_path"
            type: "string"
            required: true
            description: "zip 文件的绝对路径"
        returns: "text confirmation"

  - name: "structure"
    label: "文档结构"
    tools:
      - name: "get_toc"
        description: "获取文档的目录树（TOC），返回层级化的标题结构"
        parameters: []
        returns: "JSON array of TOC nodes"
        
      - name: "get_page_stats"
        description: "统计每个 PDF 页码包含的语义块数量"
        parameters: []
        returns: "text with page statistics"

  - name: "blocks"
    label: "语义块操作"
    tools:
      - name: "get_blocks"
        description: "获取语义块列表（支持分页和按父节点过滤）"
        parameters:
          - name: "parent_id"
            type: "string"
            required: false
            description: "可选：只获取指定父块下的子块"
          - name: "limit"
            type: "integer"
            required: false
            default: 100
            description: "返回数量上限"
          - name: "offset"
            type: "integer"
            required: false
            default: 0
            description: "偏移量"
        returns: "JSON array of Block objects"
        
      - name: "get_block"
        description: "根据 ID 获取单个语义块的完整信息"
        parameters:
          - name: "id"
            type: "string"
            required: true
            description: "语义块的唯一 ID"
        returns: "JSON Block object"
        
      - name: "get_blocks_by_page"
        description: "根据 PDF 页码范围获取该页上的所有语义块"
        parameters:
          - name: "page_start"
            type: "integer"
            required: true
            description: "起始页码（包含）"
          - name: "page_end"
            type: "integer"
            required: true
            description: "结束页码（包含）"
        returns: "JSON array of Block objects"
        
      - name: "update_block"
        description: "更新语义块的内容（带乐观锁版本控制）"
        parameters:
          - name: "id"
            type: "string"
            required: true
            description: "语义块的唯一 ID"
          - name: "content"
            type: "string"
            required: true
            description: "新的内容"
          - name: "version"
            type: "integer"
            required: true
            description: "期望的当前版本号（用于乐观锁）"
        returns: "text confirmation with new version"

  - name: "search"
    label: "搜索"
    tools:
      - name: "search_blocks"
        description: "使用 FTS5 全文搜索引擎搜索语义块"
        parameters:
          - name: "query"
            type: "string"
            required: true
            description: "搜索关键词（支持 FTS5 语法）"
          - name: "limit"
            type: "integer"
            required: false
            default: 20
            description: "返回结果数量上限"
        returns: "JSON array of matching Block objects"

  - name: "diagnostics"
    label: "前端诊断"
    description: "通过 Playwright MCP 工具观察前端 UI 状态，用于程序调试和项目内容了解"
    tools:
      - name: "get_page_text"
        description: "获取当前页面所有可见文本内容。用于快速了解当前显示了什么内容、哪个项目被打开、当前编辑区的内容等。"
        usage: "使用 Playwright MCP 的 playwright_get_visible_text 工具"
        example: |
          # 了解当前页面状态
          playwright_get_visible_text()
          # 返回: "NarrativeStructure 文档智能化重构工作台..."
          
      - name: "get_page_html"
        description: "获取当前页面 HTML 结构。用于详细分析 DOM 结构、组件状态、面板布局等。适合深入了解前端架构。"
        usage: "使用 Playwright MCP 的 playwright_get_visible_html 工具"
        example: |
          # 获取完整 HTML
          playwright_get_visible_html(removeScripts: true, maxLength: 50000)
          # 获取特定区域
          playwright_get_visible_html(selector: ".workspace-area")
          
      - name: "get_console_logs"
        description: "获取浏览器控制台日志。用于调试前端错误、查看项目加载进度、检查数据加载状态。"
        usage: "使用 Playwright MCP 的 playwright_console_logs 工具"
        example: |
          # 查看所有日志
          playwright_console_logs(type: "all", limit: 50)
          # 只看错误
          playwright_console_logs(type: "error", limit: 10)
          
      - name: "get_network_logs"
        description: "获取网络请求日志。用于检查数据加载是否正常、API 调用是否成功。"
        usage: "使用 browser-tools MCP 的 getNetworkLogs / getNetworkErrors 工具"
        example: |
          getNetworkLogs()
          getNetworkErrors()
          
      - name: "evaluate_js"
        description: "在浏览器中执行任意 JavaScript 代码。用于获取任意前端状态、调用 window.screenshot()、检查变量值等。"
        usage: "使用 Playwright MCP 的 playwright_evaluate 工具"
        example: |
          # 获取当前项目路径
          playwright_evaluate("document.querySelector('.topbar-project-path')?.textContent")
          # 获取 localStorage 中的最近项目
          playwright_evaluate("JSON.parse(localStorage.getItem('narrative-structure-recent') || '[]')")
          # 获取当前编辑的内容
          playwright_evaluate("document.querySelector('.editor-content')?.innerText")

  - name: "assets"
    label: "资源文件"
    tools:
      - name: "list_assets"
        description: "列出项目 assets 目录下的所有资源文件"
        parameters: []
        returns: "text list of relative file paths"
        
      - name: "find_asset"
        description: "在 assets 目录中搜索匹配模式的文件"
        parameters:
          - name: "pattern"
            type: "string"
            required: true
            description: "文件名匹配模式（子串匹配）"
        returns: "text with matching file path or not found message"

# Usage Examples
examples:
  - name: "List all tools"
    command: "echo '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"tools/list\"}' | narrative-mcp -p /path/to/project"
    
  - name: "Get project info"
    command: "echo '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"tools/call\",\"params\":{\"name\":\"get_project_info\"}}' | narrative-mcp -p /path/to/project"
    
  - name: "Search for content"
    command: "echo '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"tools/call\",\"params\":{\"name\":\"search_blocks\",\"arguments\":{\"query\":\"keyword\"}}}' | narrative-mcp -p /path/to/project"
    
  - name: "Get TOC"
    command: "echo '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"tools/call\",\"params\":{\"name\":\"get_toc\"}}' | narrative-mcp -p /path/to/project"

# Block Schema
block_schema:
  id: "string (UUID)"
  parent_id: "string (UUID) | null"
  order_idx: "integer"
  level: "integer (heading level, 0 for non-headings)"
  block_type: "string (heading|text|interline_equation|table|image|empty)"
  content: "string (edited content)"
  original_content: "string (original extracted content)"
  metadata: "string (JSON with page, position, etc.)"
  version: "integer (optimistic lock version)"
  created_at: "string (ISO 8601 timestamp)"
  updated_at: "string (ISO 8601 timestamp)"